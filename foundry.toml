[profile.default]
src = "contracts/src"
test = "contracts/test"
script = "contracts/script"
out = "contracts/out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
solc_version = "0.8.25"
evm_version = "cancun"
via_ir = false

[rpc_endpoints]
optimism = "${OPTIMISM_RPC_URL}"
sepolia  = "${OP_SEPOLIA_RPC_URL}"

[etherscan]
optimism = { key = "${ETHERSCAN_API_KEY}", url = "https://api-optimistic.etherscan.io/api" }
sepolia  = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia-optimistic.etherscan.io/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
